<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body class="container">
    <h1 class="text-center my-5">Data Mahasiswa</h1>
    <div class="flex">
        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h5 class="card-title">Form Data Mahasiswa</h5>
                <!-- NIM -->
                <div class="mb-3">
                    <label for="input-nim" class="form-label">NIM (Nomor Induk Mahasiswa)</label>
                    <input type="text" id="input-nim" class="form-control" placeholder="Contoh: 231011450500" required pattern="[0-9]+" maxlength="15" onblur="validateInput(this)">
                </div>

                <!-- NAMA -->
                <div class="mb-3">
                    <label for="input-nama" class="form-label">Nama Lengkap</label>
                    <input type="text" id="input-nama" class="form-control" placeholder="Contoh: Abdul Majid" required onblur="validateInput(this)">
                </div>

                <!-- FAKULTAS -->
                <div class="mb-3">
                    <label for="input-fakultas" class="form-label">Fakultas</label>
                    <input type="text" id="input-fakultas" class="form-control" placeholder="Contoh: Ilmu Komputer" required onblur="validateInput(this)">
                </div>

                <!-- JURUSAN -->
                <div class="mb-3">
                    <label for="input-jurusan" class="form-label">Jurusan</label>
                    <input type="text" id="input-jurusan" class="form-control" placeholder="Contoh: Teknik Informatika" required onblur="validateInput(this)">
                </div>

                <!-- Tombol Dinamis -->
                <div class="btn-group" id="form-actions">
                    <button type="submit" class="btn btn-primary" id="btn-submit-main">
                        <!-- Plus icon SVG -->
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
                        <span>Tambah Data</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
