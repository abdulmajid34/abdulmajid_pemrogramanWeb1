<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // function declaration
        function hello() {
            console.log("Hello World");
            alert("Hello World");
            document.write("Hello World");
        }

        // calling function
        hello();

        function tambah(a, b) {
            let hasil = a + b;
            console.log(hasil);
        }

        tambah(10, 20);

        // contoh function dengan return value
        function kali(a, b) {
            return a * b;
        }

        let hasilKali = kali(10, 20);
        console.log(hasilKali);
    </script>
</body>
</html>
