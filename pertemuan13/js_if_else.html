<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = 10;
        let b = 20;
        
        // contoh if tanpa else
        if(a > b) {
            console.log("a is greater than b");
        }

        // contoh if else
        if(a > b) {
            console.log("a is greater than b");
        } else {
            console.log("b is greater than a");
        }

        // contoh nested if (menentukan nilai a,b,c,d,e)
        let c = 80;
        if(c >= 90) {
            console.log("A");
        } else if(c >= 80) {
            console.log("B");
        } else if(c >= 70) {
            console.log("C");
        } else if(c >= 60) {
            console.log("D");
        } else {
            console.log("E");
        }
    </script>
</body>
</html>
